name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Unit Tests
        run: |
          python -m pytest test/test_action_setup.py -v

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Docker Build
        id: setup-build
        uses: docker/setup-buildx-action@v3

      - name: Build the Container
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: generate-jsonschema-action:test

      - name: Verify Action Files
        run: |
          echo "✓ Verifying action configuration..."
          test -f action.yml
          test -f Dockerfile
          test -f src/generate_jsonschema_action.py
          test -f test/data.model.csv
          echo "✓ All required files present"
